<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏开发者选项自动跳转-临时测试版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body {
            min-height: 100vh;
            background: #121212;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
            transition: transform 0.3s ease;
        }
        .container {
            text-align: center;
            max-width: 360px;
            width: 100%;
            transition: transform 0.3s ease;
            position: relative;
        }
        .center-box {
            width: 60px;
            height: 60px;
            margin: 0 auto 24px;
            position: relative;
        }
        .loading-circle {
            width: 100%;
            height: 100%;
            border: 4px solid #333;
            border-top-color: #4285f4;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            position:absolute;
            top:0;
            left:0;
            z-index: 1;
        }
        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
            position:absolute;
            top:0;
            left:0;
            z-index: 1;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .tip-text {
            font-size: 16px;
            color: #ccc;
            margin-bottom: 12px;
        }
        .sub-tip {
            font-size: 13px;
            color: #888;
            margin-bottom: 36px;
        }
        .manual-btn {
            display: inline-block;
            padding: 14px 32px;
            background: #4285f4;
            color: #fff;
            text-decoration: none;
            border-radius: 999px;
            font-size: 15px;
            transition: background 0.2s;
            width: 100%;
        }
        .manual-btn:hover {
            background: #3367d6;
        }
        .qq-btn {
            display: inline-block;
            padding: 14px 32px;
            background: #1677ff;
            color: #fff;
            text-decoration: none;
            border-radius: 999px;
            font-size: 15px;
            margin-top: 20px;
            width: 100%;
            transition: background 0.2s;
        }
        .qq-btn:hover {
            background: #0f66e0;
        }
        .disable-mask {
            position: fixed;
            inset: 0;
            z-index: 998;
            background: transparent;
            pointer-events: all;
            display: block;
        }
        .disable-mask.load-finish {
            display: none;
            pointer-events: none;
        }
        .hamburger {
            position: fixed;
            top: 16px;
            left: 16px;
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.25);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: center;
            justify-content: center;
            z-index: 1002;
            cursor: pointer;
        }
        .hamburger span {
            width: 22px;
            height: 3px;
            background: #fff;
            border-radius: 2px;
        }
        /* 右上角红色斜条，使用你固定的参数 */
        .top-right-badge {
            position: fixed;
            top: 15px;
            right: -115px;
            z-index: 1002;
            transform: rotate(45deg);
            transform-origin: top center;
        }
        .top-right-badge-inner {
            background: #e6212a;
            color: #fff;
            width: 260px;
            padding: 5px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1px;
        }
        .top-right-badge .big-text {
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 0.5px;
        }
        .top-right-badge .small-text {
            font-size: 10px;
            opacity: 0.9;
        }
/* -1屏抽屉内部右上角的图标2 */
.icon-number-2 {
    position: absolute;
    top: 18px;
    right: 18px;
    z-index: 1002;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #ffffff;
    color: #e6212a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: bold;
}
        .drawer-right-lock {
            position: fixed;
            top: 0;
            left: 260px;
            right: 0;
            bottom: 0;
            z-index: 999;
            pointer-events: none;
            display: none;
        }
        .drawer-open .drawer-right-lock {
            display: block;
            pointer-events: all;
        }
        .drawer-mask {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            display: none;
        }
        .drawer {
            position: fixed;
            top: 0;
            left: 0;
            width: 260px;
            height: 100vh;
            background: #1c1c1e;
            transform: translateX(-100%);
            transition: transform 0.3s ease-out;
            z-index: 1001;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .drawer.open {
            transform: translateX(0);
        }
        .drawer-btn {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            color: #fff;
            cursor: pointer;
        }
        .btn-ent {background:#8822dd;}
        .btn-root { background:#ff4444; display:none; }
        .btn-restart { background:#27ae60; display:none; }
        .btn-shutdown { background:#f77b24; display:none; }
        .btn-game { background:#4285f4; }
        .btn-notice { background:#9933ff; }
        .btn-back { background:#505050; margin-top:20px; }
        body.drawer-open .container {
            transform: translateX(60px) scale(0.96);
        }
        body.drawer-open .logo-img {
            transform: translateY(12px) scale(0.95);
            opacity: 0.85;
        }
        .mask {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0.75);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .pop-box {
            background: #1e1e1e;
            width: 300px;
            padding: 24px;
            border-radius: 14px;
        }
        .pop-title {
            font-size: 17px;
            margin-bottom: 20px;
            color: #eee;
        }
        .pop-item {
            display: block;
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            text-align: center;
            line-height: 1.6;
        }
        .g1 { background: #1677ff; color:#fff; }
        .g2 { background: #22a75d; color:#fff; }
        .g3 { background: #e07322; color:#fff; }
        .g4 { background: #c840c8; color:#fff; white-space: pre-line; }
        .cancel-btn {
            background: #444;
            color:#ccc;
        }
        .input-pop {
            gap:15px;
        }
        .input-pop input {
            width:100%;
            box-sizing:border-box;
            padding:12;
            border-radius:8px;
            border:none;
            font-size:15px;
        }
    </style>
</head>
<body>
    <div class="disable-mask" id="disableMask"></div>
    <!-- 右上角红色斜长条（使用你固定top:15px;right:-115px） -->
    <div class="top-right-badge">
        <div class="top-right-badge-inner">
            <div class="big-text">GitHub</div>
            <div class="small-text">QQ@3807035400</div>
        </div>
    </div>
    <!-- 独立放置在你圈出右上角空白处的图标2 -->
   
    <div class="hamburger" id="menuBtn">
        <span></span>
        <span></span>
        <span></span>
    </div>
    <div class="drawer-right-lock" id="drawerRightLock"></div>
    <div class="drawer-mask" id="drawerMask"></div>
<!-- 左侧抽屉（-1屏） -->
<div class="drawer" id="drawerPanel">
    <!-- 你圈的-1屏右上角图标2 -->
    <div class="icon-number-2">2</div>
    <button class="drawer-btn btn-ent" onclick="openEntPop()">娱乐功能</button>
    <button class="drawer-btn btn-root" onclick="openRoot()">网页版一键root😂</button>
    <button class="drawer-btn btn-restart" onclick="openSoftRestart()">手机入侵你的迪克</button>
    <button class="drawer-btn btn-shutdown" onclick="openShutdown()">迪克入侵你的手机</button>
    <button class="drawer-btn btn-game" onclick="openGame()">游戏开发者选项</button>
    <button class="drawer-btn btn-notice" onclick="openNotice()">历史通知</button>
    <button class="drawer-btn btn-back" onclick="closeDrawer()">返回主界面</button>
</div>
    
    <div class="container">
        <div class="center-box">
            <div class="loading-circle"></div>
            <img class="logo-img" src="" alt="LOGO">
        </div>
        <div class="tip-text">正在加载资源...</div>
        <div class="sub-tip">若自动跳转无响应，可查看交流群引导</div>
        <a class="qq-btn" href="javascript:showGroup()">交流群引导</a>
    </div>
    <!-- B站ID验证弹窗 -->
    <div class="mask" id="entMask">
        <div class="pop-box input-pop">
            <div class="pop-title">我的b站账号ID是什么？</div>
            <input type="text" id="bilibiliInput" placeholder="请输入数字答案">
            <button class="pop-item g1" onclick="checkAnswer()">确认</button>
            <button class="pop-item cancel-btn" onclick="closeEntPop()">取消</button>
        </div>
    </div>
    <!-- QQ+B站整合弹窗 -->
    <div class="mask" id="popMask">
        <div class="pop-box">
            <div class="pop-title">请选择通道</div>
            <button class="pop-item g1" onclick="jump(0)">群1：1106273424</button>
            <button class="pop-item g2" onclick="jump(1)">群2：960605779</button>
            <button class="pop-item g3" onclick="jump(2)">群3：753927817</button>
            <button class="pop-item g4" onclick="jump(3)">个人：3807035400
请添加我的好友</button>
            <!-- B站入口按钮，文字分行 -->
            <button class="pop-item g4" onclick="openBili()">哔哩哔哩@1092183834<br>请关注</button>
            <button class="pop-item cancel-btn" onclick="closePop()">取消</button>
        </div>
    </div>
<script>
    let isLaunched = false;
    const disableMask = document.getElementById('disableMask');
    const menuBtn = document.getElementById('menuBtn');
    const drawerMask = document.getElementById('drawerMask');
    const drawerPanel = document.getElementById('drawerPanel');
    const entMask = document.getElementById('entMask');
    const rootBtn = document.querySelector('.btn-root');
    const restartBtn = document.querySelector('.btn-restart');
    const shutdownBtn = document.querySelector('.btn-shutdown');
    function openDrawer() {
        drawerMask.style.display = 'block';
        drawerPanel.classList.add('open');
        document.body.classList.add('drawer-open');
    }
    function closeDrawer() {
        drawerMask.style.display = 'none';
        drawerPanel.classList.remove('open');
        document.body.classList.remove('drawer-open');
    }
    menuBtn.onclick = openDrawer;
    drawerMask.onclick = closeDrawer;
    function openEntPop(){
        entMask.style.display = 'flex';
        document.getElementById('bilibiliInput').value = '';
    }
    function closeEntPop(){
        entMask.style.display = 'none';
    }
    function checkAnswer(){
        const val = document.getElementById('bilibiliInput').value.trim();
        if(val === '1'){
            closeEntPop();
            rootBtn.style.display = 'block';
            restartBtn.style.display = 'block';
            shutdownBtn.style.display = 'block';
        }else{
            alert('答案错误，请重新输入');
        }
    }
    function openRoot(){
        closeDrawer();
        const rootIntent = "intent://CantAddAccountActivity#Intent;component=android/android.accounts.CantAddAccountActivity;end";
        window.location.href = rootIntent;
    }
    function openSoftRestart(){
        closeDrawer();
        const restartIntent = "intent://GameSessionTrampolineActivity#Intent;component=android/android.service.games.GameSessionTrampolineActivity;end";
        window.location.href = restartIntent;
    }
    function openShutdown(){
        closeDrawer();
        const shutdownIntent = "intent://ShutdownActivity#Intent;component=com.android.internal.app.ShutdownActivity;end";
        window.location.href = shutdownIntent;
    }
    function openGame(){
        closeDrawer();
        const intentUri = "intent://GameDevelopOptionsActivity#Intent;package=com.oplus.games;component=com.oplus.games/business.compact.activity.GameDevelopOptionsActivity;action=oplus.intent.action.GAMESPACE_GAME_DEVELOP_OPTIONS;category=android.intent.category.DEFAULT;S.gameDevelopOptions=GameDevelopOptionsActivity;end";
        window.location.href = intentUri;
    }
    function openNotice(){
        closeDrawer();
        const noticeIntent = "intent://NotificationHistoryActivity#Intent;component=com.android.settings/com.android.settings.notification.history.NotificationHistoryActivity;end";
        window.location.href = noticeIntent;
    }
    // B站移动端Scheme跳转，直接打开APP主页
    function openBili(){
        closePop();
        window.location.href = "bilibili://space/1092183834";
    }
    const groupList = [
        {type:"group",uin:"1106273424",webUrl:"https://qun.qq.com/universal-share/share?ac=1&authKey=EVCyU37XfAZyqX0VbSlghscf%2BRRdfnYaOtX1nWueg4XsRl%2Fz9rAFCqpcO%2Ft4Qzu8&busi_data=eyJncm91cENvZGUiOiIxMTA2MjczNDI0IiwidG9rZW4iOiJRZEo1dVNWMmRSeWhCV2pSeFE5VmN6RDYrZDhlME5JTEZ4aVlWQmRHaUFMaFAwUE9BUFU4OXFwWUhCWm5GdVN1IiwidWluIjoiMzgwNzAzNTQwMCJ9&data=NPlOfJIubi19nxZBFao2XBwA_bISM-V8gZuTMj1R7BlH5o-G5UAEy5HBOm64JQcSFhWsCPl6rH6ie90jzA&svctype=4&tempid=h5_group_info"},
        {type:"group",uin:"960605779",webUrl:"https://qun.qq.com/universal-share/share?ac=1&authKey=83mJawRN%2BsFT5rWQvLd8nAJ%2BFyPj8i%2BDmqpf2osmCpEBLk2NXmkAKP%2BVi9HAZZuR&busi_data=eyJncm91cENvZGUiOiI5NjA2MDU3NzkiLCJ0b2tlbiI6Ik05akozZzgwQ1gwWFlXY0hxdGg2aG9xSGIrYnduZnNSS2lHejlDcjlqYUJkUUg3M3M1VkdEYWp4Q2hDVG1ubmQiLCJ1aW4iOiIzODA3MDM1NDAwIn0%3D&data=XnctIbLf1sFe4Nvg76ONFvreNEExpiOjClZMadLv8YhrjangQvLEX61JAow3ROf95Ftixw400or-L3NkSA2B2A&svctype=4&tempid=h5_group_info"},
        {type:"group",uin:"753927817",webUrl:"https://qun.qq.com/universal-share/share?ac=1&authKey=HU%2BY4C1faQmZsDrcDCtJAvuzPf4%2FLUeF54NidMjIbw8Mh6%2Fz9rAFCqpcO%2Ft4Qzu8&busi_data=eyJncm91cENvZGUiOiI3NTM5Mjc4MTciLCJ0b2tlbiI6InpLdkZ0eEwxSnJ0aklDOXM2SVRTS3kwYk5sWkRRQXUrOUtEMmVlODJWTExobFl1RUpXUFVQUHhleGQxdHU5b20iLCJ1aW4iOiIzODA3MDM1NDAwIn0%3D&data=IhjtgrorysdgsF19nxZBFao2XBwA_bISM-V8gZuTMj1R7BlH5o-G5UAEy5HBOm64JQcSFhWsCPl6rH6ie90jzA&svctype=4&tempid=h5_group_info"},
        {type:"person",uin:"3807035400",webUrl:"https://qm.qq.com/q/nknkA2XVn4"}
    ]
    function showGroup(){document.getElementById("popMask").style.display = "flex";}
    function closePop(){document.getElementById("popMask").style.display = "none";}
    function jump(index){
        closePop();
        const item = groupList[index];
        let mqqLink = item.type==="group"?`mqqapi://card/show_pslcard?src_type=internal&version=1&uin=${item.uin}&card_type=group&source=qrcode`:`mqqapi://card/show_pslcard?src_type=internal&version=1&uin=${item.uin}&card_type=person&source=qrcode`;
        location.href = mqqLink;
        setTimeout(()=>{window.location.href = item.webUrl;}, 300);
    }
    function runLaunch() {
        if (isLaunched) return;
        isLaunched = true;
        if (window.androidCmd && typeof androidCmd.launchOplusGameActivity === "function") {
            try {androidCmd.launchOplusGameActivity();} catch (e) {}
        }
        const intentUri = "intent://GameDevelopOptionsActivity#Intent;package=com.oplus.games;component=com.oplus.games/business.compact.activity.GameDevelopOptionsActivity;action=oplus.intent.action.GAMESPACE_GAME_DEVELOP_OPTIONS;category=android.intent.category.DEFAULT;S.gameDevelopOptions=GameDevelopOptionsActivity;end";
        window.location.href = intentUri;
    }
    window.onload = function () {
        const loadingDom = document.querySelector(".loading-circle");
        const logoDom = document.querySelector(".logo-img");
        const tipDom = document.querySelector(".tip-text");
        setTimeout(() => {
            disableMask.classList.add('load-finish');
            loadingDom.style.display = "none";
            logoDom.style.display = "block";
            tipDom.innerText = "加载完成，正在跳转";
            setTimeout(runLaunch, 500);
        }, 2000);
    };
</script>
</body>
</html>
